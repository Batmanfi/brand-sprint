<style>
  html { scroll-behavior: smooth; }
  body { background: var(--dj-canvas); overflow-x: hidden; }
  ::selection { background: var(--dj-orange); color: #fff; }

  /* Section reveal-on-scroll */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s var(--ease-out), transform .7s var(--ease-out); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

  /* Cal.com embed frame */
  #cal-embed { width: 100%; min-height: 640px; border-radius: var(--radius-lg); overflow: hidden; }
  #cal-embed iframe { border-radius: var(--radius-lg); }

  /* toast */
  .toast { position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px);
    background: #000; color: #fff; padding: 13px 24px; border-radius: 999px; font: 500 14px var(--font-sans);
    opacity: 0; pointer-events: none; transition: all .3s var(--ease-out); z-index: 120; box-shadow: var(--shadow-float); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  a { color: inherit; }

  /* Container gutters — looser on mobile so content isn't squeezed */
  .dj-container { padding-left: 40px; padding-right: 40px; }
  @media (max-width: 640px) {
    .dj-container { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script type="text/babel" src="sections/shared.jsx"></script>
<script type="text/babel" src="sections/Hero.jsx"></script>
<script type="text/babel" src="sections/Booking.jsx"></script>
<script type="text/babel" src="sections/Testimonials.jsx"></script>
<script type="text/babel" src="sections/Problem.jsx"></script>
<script type="text/babel" src="sections/Solution.jsx"></script>
<script type="text/babel" src="sections/FinalCta.jsx"></script>
<script type="text/babel" src="sections/Faq.jsx"></script>
<script type="text/babel" src="sections/Footer.jsx"></script>
<script type="text/babel" src="sections/StickyCta.jsx"></script>
<script type="text/babel">
  const { Hero, Booking, Testimonials, Problem, Solution, FinalCta, Faq, SiteFooter, StickyCta } = window;

  function scrollToId(id) {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 12;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(window.__tt); window.__tt = setTimeout(() => t.classList.remove('show'), 2000);
  }
  const goBook = () => scrollToId('book');

  function App() {
    React.useEffect(() => {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
      return () => io.disconnect();
    }, []);

    return (
      <React.Fragment>
        <Hero onApply={goBook} />
        <Booking onApply={goBook} />
        <Testimonials />
        <Problem />
        <Solution />
        <FinalCta onApply={goBook} />
        <Faq />
        <SiteFooter />
        <StickyCta onApply={goBook} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
